name: Build xdesk armv7 (Raspberry Pi)

on:
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      upload-tag:
        type: string
        default: "nightly"
  workflow_dispatch:
    inputs:
      upload-tag:
        description: 'Release tag'
        required: true
        default: 'nightly'

env:
